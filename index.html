<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Customiza Kanban | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">
    <div class="auth-header">
        <h1>Customiza Kanban</h1>
    </div>

    <div id="loginForm">
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> E-mail</label>
            <input type="email" id="loginEmail" class="input-moderno" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Senha</label>
            <div class="password-wrapper">
                <input type="password" id="loginPassword" class="input-moderno" placeholder="••••••" autocomplete="current-password">
                <button type="button" id="togglePassword" class="toggle-password-btn">
                    <i class="fas fa-eye-slash"></i>
                </button>
            </div>
        </div>
        <div class="flex-btns">
            <button class="btn-primary" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Entrar</button>
        </div>
        <div id="loginError" class="error-message hidden"></div>
    </div>

    <button id="themeToggle" class="theme-toggle-btn" title="Alternar tema claro/escuro">
        <i class="fas fa-moon"></i>
    </button>
</div>

<div id="loadingOverlay" class="loading-overlay hidden">
    <div class="spinner"></div>
    <div class="loading-text">Autenticando...</div>
</div>

<script type="module" src="index.js"></script>
</body>
</html>
